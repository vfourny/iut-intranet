name: Create project issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (affiche les issues sans les créer)"
        required: false
        default: "false"
        type: boolean

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create all project issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const script = require('./.github/scripts/create-issues.cjs');
            await script({ github, context, core });
