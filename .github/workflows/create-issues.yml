            const milestoneMap = {};
            for (const m of milestonesRes.data) {
              milestoneMap[m.title] = m.number;
            }
            console.log('Milestones trouvĂŠs :', JSON.stringify(milestoneMap));

            function findMilestone(num) {
              for (const [key, val] of Object.entries(milestoneMap)) {
                if (key.includes(`Sprint ${num}`) || key.includes(`Milestone ${num}`)) return val;
              }
