            // ââ Create issues âââââââââââââââââââââââââââââââââââââââââââââââââ

            console.log(`\nđ ${issues.length} issues Ă  crĂŠer (dry_run=${dryRun})\n`);

            let created = 0;
            let failed = 0;

            for (const issue of issues) {
              if (dryRun) {
                console.log(`[DRY RUN] Would create: ${issue.title} â milestone ${issue.milestone}`);
                created++;
                continue;
              }

              try {
                const payload = {
                  owner, repo,
                  title: issue.title,
                  body: issue.body,
                  labels: issue.labels,
                };
                if (issue.milestone) payload.milestone = issue.milestone;

                const result = await github.rest.issues.create(payload);
                console.log(`â #${result.data.number} â ${issue.title}`);
                created++;

                // Pause to respect GitHub API rate limits
                await new Promise(r => setTimeout(r, 400));
              } catch (err) {
                console.error(`â ERREUR pour "${issue.title}" :`, err.message);
                failed++;
              }
            }

            console.log(`\nđ TerminĂŠ ! ${created} issues crĂŠĂŠes, ${failed} erreurs.`);
