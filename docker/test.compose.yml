name: iut-intranet-test

services:
  postgres:
    extends:
      file: ./postgres.base.yml
      service: postgres
    container_name: iut-intranet-postgres-test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data

  test-runner:
    container_name: iut-intranet-test-runner
    restart: 'no'
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: ..
      dockerfile: ./docker/Dockerfile
      target: deps
    environment:
      TEST_COMMAND: ${TEST_COMMAND:-test:exec}
      NODE_ENV: test
      DATABASE_URL: postgresql://root:root@postgres:5432/iut-intranet-db
      API_PORT: 8000
      APP_PORT: 5173
      PUBLIC_API_URL: http://localhost:8000/api
      PUBLIC_APP_URL: http://localhost:5173
      BETTER_AUTH_SECRET: test-secret-for-testing-only
      EMAIL_FROM: test@example.com
      RESEND_API_KEY: test-api-key
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: iut-intranet-storage
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: fr-par
    ports:
      - '51204:51204'
    volumes:
      - ..:/app
      - /app/node_modules
    command: sh /app/docker/test-entrypoint.sh
