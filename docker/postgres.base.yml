services:
  postgres:
    image: postgres:15.17
    environment:
      POSTGRES_DB: iut-intranet-db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d iut-intranet-db']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
