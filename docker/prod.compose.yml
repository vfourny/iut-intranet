name: ${NAME:-iut-intranet}

services:
  postgres:
    extends:
      file: ./postgres.base.yml
      service: postgres
    container_name: ${NAME:-iut-intranet}-postgres
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data

  minio:
    extends:
      file: ./minio.base.yml
      service: minio
    container_name: ${NAME:-iut-intranet}-minio
    restart: unless-stopped
    volumes:
      - minio_data:/data
    labels:
      # Exposed publicly because uploaded object URLs are built from S3_ENDPOINT
      # and must be reachable by the browser (see packages/providers/src/s3.provider.ts).
      - traefik.enable=true
      - traefik.http.routers.minio.entryPoints=websecure
      - 'traefik.http.services.minio.loadbalancer.server.port=9000'
      - traefik.http.routers.minio.rule=Host(`s3.${NAME}.jrcan.dev`)
      - traefik.http.routers.minio.tls=true
      - traefik.http.routers.minio.tls.certresolver=myresolver

  minio-init:
    extends:
      file: ./minio.base.yml
      service: minio-init
    container_name: ${NAME:-iut-intranet}-minio-init
    depends_on:
      minio:
        condition: service_healthy

  api:
    container_name: ${NAME:-iut-intranet}-api
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: api
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL}
        PUBLIC_APP_URL: ${PUBLIC_APP_URL}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://root:root@postgres:5432/iut-intranet-db
      # Public endpoint: stored object URLs must resolve from the browser, so this
      # points at the Traefik-exposed MinIO host, not the internal http://minio:9000.
      S3_ENDPOINT: https://s3.${NAME}.jrcan.dev
    # ports:
    #   - '${API_PORT:-8000}:${API_PORT:-8000}'
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.entryPoints=websecure
      - 'traefik.http.services.api.loadbalancer.server.port=${API_PORT:-8000}'
      - traefik.http.routers.api.rule=Host(`${NAME}.jrcan.dev`) && PathPrefix(/api)
      - traefik.http.routers.api.tls=true
      - traefik.http.routers.api.tls.certresolver=myresolver
    # Seeds are dev-only (see packages/db db:seed). Prod applies migrations, then
    # runs the idempotent admin bootstrap (no-op once an admin exists; skipped if
    # ADMIN_EMAIL is unset), then starts the server.
    command:
      - sh
      - -c
      - 'npx turbo db:deploy --filter=@iut-intranet/db && node apps/api/dist/scripts/bootstrap-admin.js && node apps/api/dist/index.js'

  web:
    container_name: ${NAME:-iut-intranet}-web
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: web
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL}
        PUBLIC_APP_URL: ${PUBLIC_APP_URL}
    restart: unless-stopped
    # PUBLIC_* are baked in at build time (build args). The only runtime env the
    # static `vite preview` needs is APP_PORT (preview.port), so we don't inject
    # the whole ../.env (and its server-side secrets) here.
    environment:
      APP_PORT: ${APP_PORT:-5173}
    # ports:
    #   - '${APP_PORT:-5173}:${APP_PORT:-5173}'
    depends_on:
      - api
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.entryPoints=websecure
      - 'traefik.http.services.web.loadbalancer.server.port=${APP_PORT:-5173}'
      - traefik.http.routers.web.rule=Host(`${NAME}.jrcan.dev`)
      - traefik.http.routers.web.tls=true
      - traefik.http.routers.web.tls.certresolver=myresolver

volumes:
  db_data:
  minio_data:
